name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/adh1310/guessmoji

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.repository_owner == 'adh1310'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Note skipped publish for non-canonical owner
        if: github.repository_owner != 'adh1310'
        run: |
          echo "Skipping GHCR push because this repository owner is '${{ github.repository_owner }}', not 'adh1310'." >> "$GITHUB_STEP_SUMMARY"
          echo "The image still builds with the required target name: ${{ env.IMAGE_NAME }}." >> "$GITHUB_STEP_SUMMARY"

      - name: Build and maybe push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.repository_owner == 'adh1310' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

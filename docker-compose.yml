services:
  guessmoji:
    image: ghcr.io/hallveticapro/guessmoji:latest
    container_name: guessmoji
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-Guessmoji}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
    env_file:
      - .env

    # To build locally instead of using GHCR, uncomment:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
